<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScaleSpot</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎵</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --page-bg-1: #667eea;
      --page-bg-2: #764ba2;
      --card-bg: #ffffff;
      --text-main: #43301c;
      --text-sub: #667eea;
      --panel-bg-1: #f5f7fa;
      --panel-bg-2: #c3cfe2;
      --canvas-bg: #f5f7fa;
      --util-bg-1: #f5f7fa;
      --util-bg-2: #dfe4f0;
      --item-bg: #ffffff;
      --info-bg: #fff3cd;
      --info-text: #333;
      --track-bg: #ecf0f1;
    }

    [data-theme="dark"] {
      --page-bg-1: #1e1b3a;
      --page-bg-2: #2d1b3a;
      --card-bg: #241f3d;
      --text-main: #f0e9ff;
      --text-sub: #a5b4fc;
      --panel-bg-1: #2c2750;
      --panel-bg-2: #241f45;
      --canvas-bg: #1c1832;
      --util-bg-1: #2c2750;
      --util-bg-2: #241f45;
      --item-bg: #2c2750;
      --info-bg: #3a2f1a;
      --info-text: #f0e9ff;
      --track-bg: #14112a;
    }

    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(135deg, var(--page-bg-1) 0%, var(--page-bg-2) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.3s ease;
    }

    .container {
      background: var(--card-bg);
      border-radius: 30px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      border: 5px solid #ff4757;
      position: relative;
      transition: background 0.3s ease;
    }

    .theme-toggle {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--panel-bg-1);
      border: 2px solid var(--text-sub);
      font-size: 1.1em;
      cursor: pointer;
      flex: none;
      padding: 0;
    }

    h1 {
      color: #ff4757;
      text-align: center;
      margin-bottom: 10px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
    }

    .subtitle {
      text-align: center;
      color: var(--text-sub);
      margin-bottom: 20px;
      font-size: 1.1em;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--text-sub);
      font-size: 0.85em;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .settings-row input[type="number"] {
      width: 65px;
      padding: 6px;
      border: 2px solid var(--text-sub);
      border-radius: 8px;
      font-family: inherit;
      font-weight: bold;
      text-align: center;
      background: var(--panel-bg-1);
      color: var(--text-main);
    }

    .settings-hint {
      font-weight: normal;
      opacity: 0.7;
    }

    .button-group {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .sample-row {
      text-align: center;
      margin-bottom: 20px;
    }

    .sample-label {
      display: block;
      color: var(--text-sub);
      font-size: 0.8em;
      opacity: 0.75;
      margin-bottom: 10px;
    }

    .sample-buttons {
      display: flex;
      gap: 10px;
    }

    .sample-buttons .drone-btn {
      flex: 1;
      padding: 10px;
    }

    button {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 15px;
      font-size: 1em;
      font-family: 'Comic Sans MS', cursive;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    .listen-btn {
      background: linear-gradient(135deg, #ff4757, #ff6b7a);
      color: white;
      box-shadow: 0 10px 25px rgba(255, 71, 87, 0.3);
    }

    .listen-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(255, 71, 87, 0.4);
    }

    .listen-btn.listening {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.7;
      }
    }

    .drone-btn {
      background: #667eea;
      color: white;
      box-shadow: 0 10px 25px rgba(50, 76, 190, 0.3);
      padding: 12px;
      font-size: 0.85em;
    }

    .drone-btn:hover:not(:disabled) {
      background: #5568d3;
      transform: translateY(-3px);
    }

    .drone-btn:disabled {
      opacity: 0.45;
      cursor: default;
      transform: none;
    }

    .meter {
      width: 100%;
      height: 20px;
      background: var(--track-bg);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .meter-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #ff4757);
      width: 0%;
      transition: width 0.1s;
    }

    .tuner-reading {
      text-align: center;
      color: var(--text-sub);
      font-weight: bold;
      font-size: 0.95em;
      margin-bottom: 20px;
      font-variant-numeric: tabular-nums;
    }

    .display-box {
      background: linear-gradient(135deg, var(--panel-bg-1), var(--panel-bg-2));
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 20px;
      border: 3px solid #667eea;
    }

    .note-display {
      text-align: center;
      font-size: 3.5em;
      color: #ff4757;
      font-weight: bold;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
    }

    .scale-display {
      text-align: center;
      font-size: 1.3em;
      color: var(--text-sub);
      margin-bottom: 4px;
    }

    .sargam-display {
      text-align: center;
      font-size: 1em;
      color: var(--text-main);
      opacity: 0.75;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .confidence {
      background: #667eea;
      color: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      font-weight: bold;
    }

    .status {
      color: var(--text-sub);
      text-align: center;
      margin-bottom: 20px;
      min-height: 40px;
      padding: 10px;
    }

    .error {
      color: #ff4757;
      font-weight: bold;
    }

    canvas {
      width: 100%;
      height: 150px;
      border-radius: 15px;
      border: 2px solid #667eea;
      margin-bottom: 20px;
      background: var(--canvas-bg);
    }

    .drone-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .drone-controls .drone-btn {
      flex: 1 1 45%;
      min-width: 130px;
    }

    .info-box {
      background: var(--info-bg);
      border: 2px solid #ff9800;
      border-radius: 10px;
      padding: 15px;
      color: var(--info-text);
      font-size: 0.9em;
      margin-bottom: 20px;
    }

    .note-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 15px;
    }

    .pill {
      background: #ff4757;
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.9em;
      text-align: center;
      line-height: 1.3;
    }

    .pill-swara {
      display: block;
      font-size: 0.7em;
      opacity: 0.85;
      font-weight: normal;
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .lock-badge {
      background: #ff4757;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75em;
      font-weight: bold;
      visibility: hidden;
    }

    .lock-badge.on {
      visibility: visible;
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      0% {
        transform: scale(0.7);
      }

      60% {
        transform: scale(1.15);
      }

      100% {
        transform: scale(1);
      }
    }

    .redetect-btn {
      background: none;
      border: 2px solid #667eea;
      color: var(--text-sub);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75em;
      font-family: 'Comic Sans MS', cursive;
      font-weight: bold;
      cursor: pointer;
      flex: none;
    }

    .redetect-btn:hover:not(:disabled) {
      background: #667eea;
      color: white;
    }

    .redetect-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: var(--track-bg);
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #667eea, #ff4757);
      transition: width 0.2s ease;
    }

    .util-card,
    .history-card {
      background: linear-gradient(135deg, var(--util-bg-1), var(--util-bg-2));
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
      border: 3px solid #667eea;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .card-title {
      color: var(--text-sub);
      font-weight: bold;
      font-size: 1.1em;
    }

    .flute-row {
      color: var(--text-main);
      font-size: 0.88em;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .flute-row.alt {
      opacity: 0.75;
      margin-bottom: 0;
    }

    .metro-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .metro-row input[type="number"] {
      width: 60px;
      padding: 6px;
      border: 2px solid var(--text-sub);
      border-radius: 8px;
      font-family: inherit;
      font-weight: bold;
      text-align: center;
      background: var(--panel-bg-1);
      color: var(--text-main);
    }

    .metro-row .drone-btn {
      flex: none;
      padding: 8px 18px;
    }

    .metro-beats {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 14px;
    }

    .beat-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--panel-bg-1);
      border: 2px solid var(--text-sub);
      transition: transform 0.08s ease, background 0.08s ease;
    }

    .beat-dot.sam {
      border-color: #ff4757;
    }

    .beat-dot.now {
      background: linear-gradient(150deg, #667eea, #ff4757);
      transform: scale(1.35);
    }

    .history-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 220px;
      overflow-y: auto;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--item-bg);
      border: 2px solid #ff4757;
      border-radius: 12px;
      padding: 8px 14px;
    }

    .history-note {
      font-size: 1.4em;
      font-weight: bold;
      color: #ff4757;
      min-width: 36px;
    }

    .history-detail {
      flex: 1;
      color: var(--text-main);
      font-size: 0.85em;
    }

    .history-time {
      color: var(--text-sub);
      font-size: 0.75em;
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <div class="container">
    <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">🌙</button>
    <h1>Scale Detector</h1>
    <p class="subtitle">Sing or play music to detect the scale!</p>

    <div class="settings-row">
      <label for="a4Input">🎼 A4 tuning:</label>
      <input type="number" id="a4Input" min="415" max="466" step="1" value="440">
      <span>Hz</span>
      <span class="settings-hint">(standard = 440)</span>
    </div>

    <div class="button-group">
      <button class="listen-btn" id="listenBtn">🎤 START</button>
      <button class="listen-btn" id="stopBtn" disabled>⏹ STOP</button>
    </div>

    <div class="sample-row">
      <span class="sample-label">— or test it with a sample, no mic needed —</span>
      <div class="sample-buttons">
        <button class="drone-btn" id="sample1Btn">▶ Shape of You · C♯ minor</button>
        <button class="drone-btn" id="sample2Btn">▶ Shape (short) · C♯ minor</button>
      </div>
    </div>

    <div class="status" id="statusText">Ready to listen...</div>

    <div class="meter">
      <div class="meter-fill" id="meterFill"></div>
    </div>

    <div class="tuner-reading" id="tunerReading">🎯 —</div>

    <div class="display-box">
      <div class="result-head">
        <span class="lock-badge" id="lockBadge">🔒 LOCKED</span>
        <button class="redetect-btn" id="copyBtn" disabled>📋 Copy</button>
        <button class="redetect-btn" id="redetectBtn" disabled>↻ Re-detect</button>
      </div>
      <div class="note-display" id="noteDisplay">—</div>
      <div class="scale-display" id="scaleDisplay">Listening...</div>
      <div class="sargam-display" id="sargamDisplay"></div>
      <div class="progress-bar">
        <div class="progress-fill" id="confFill"></div>
      </div>
      <div class="confidence" id="confidence">Confidence: 0%</div>
    </div>

    <canvas id="pitchCanvas"></canvas>

    <div class="info-box">
      Keep singing or playing for 2-3 seconds for better accuracy
    </div>

    <div class="drone-controls">
      <button class="drone-btn" id="droneBtn" disabled>🎵 Sa Drone</button>
      <button class="drone-btn" id="dronePaBtn" disabled>🎶 Sa + Pa Drone</button>
      <button class="drone-btn" id="playScaleBtn" disabled>▶ Play Full Scale</button>
      <button class="drone-btn" id="stopDroneBtn" disabled>⏹ Stop Sound</button>
    </div>

    <div class="note-pills" id="notePills"></div>

    <div class="util-card" id="fluteCard" hidden>
      <div class="card-title">🎋 Which Bansuri to Grab</div>
      <div id="fluteInfo" style="margin-top: 10px;"></div>
    </div>

    <div class="util-card">
      <div class="card-title" style="margin-bottom: 12px;">🥁 Metronome</div>
      <div class="metro-row">
        <button class="redetect-btn" id="tapTempoBtn">👆 Tap Tempo</button>
        <input type="number" id="bpmInput" min="30" max="240" value="90">
        <span style="color: var(--text-sub); font-weight: bold; font-size: 0.85em;">BPM</span>
        <button class="drone-btn" id="metroBtn">▶ Start</button>
      </div>
      <div class="metro-beats" id="metroBeats"></div>
    </div>

    <div class="history-card" id="historyCard" hidden>
      <div class="card-head">
        <span class="card-title">📜 Recent Scales</span>
        <button class="redetect-btn" id="clearHistoryBtn">Clear</button>
      </div>
      <ul class="history-list" id="historyList"></ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
